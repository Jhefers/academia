<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Flow · Controle de Frequência</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">

    <div class="dashboard-header">
        <div class="title-section">
            <h1>🏋️ Academy Flow</h1>
            <p><i class="fa-regular fa-calendar"></i> Janeiro · Março 2026 · Controle de frequência e rateio</p>
        </div>
        <div class="stats-cards" id="stats-cards"></div>
    </div>

    <div class="insight-grid">
        <div class="glass-panel">
            <div class="panel-title"><i class="fa-solid fa-chart-simple"></i> Evolução de presenças (últimas semanas)</div>
            <div class="chart-container">
                <canvas id="attendanceChart"></canvas>
            </div>
        </div>
        <div class="glass-panel">
            <div class="panel-title"><i class="fa-solid fa-trophy"></i> Ranking</div>
            <ul class="ranking-list" id="ranking-list"></ul>
        </div>
    </div>

    <div class="filter-bar">
        <i class="fa-solid fa-filter" style="color:#a492ff;"></i>
        <span style="color:#ccc;">Destacar:</span>
        <select id="participantFilter" class="filter-select">
            <option value="all">Todos</option>
        </select>
    </div>

    <div class="weeks-section" id="weeksContainer"></div>

    <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
        <div class="stat-card" style="padding: 1rem 3rem;">
            <i class="fa-solid fa-scale-balanced" style="color: #b197ff; font-size: 2rem;"></i>
            <div>
                <span style="color:#b1a5f0;">Fundo total</span>
                <h3 id="totalFund" style="color:white;">R$ 0</h3>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
